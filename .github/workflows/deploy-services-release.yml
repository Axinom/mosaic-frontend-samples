name: Deploy FE Release (Test -> Production)
# Stages:
# - Pre-check
# - Approval: TEST
# - Deployment: TEST (all services in parallel)
# - Update Hosting: TEST
# - Post-check: TEST
# - Approval: PRODUCTION
# - Deployment: PRODUCTION (all services in parallel)
# - Update Hosting: PRODUCTION

on:
  workflow_dispatch:
    inputs:
      deploy-fe-samples:
        type: boolean
        default: true
        description: Deploy fe-samples

jobs:
  # ----------------------------------------- Pre-check ----------------------------------------- #
  # Check if release deployment comes from a branch name starting with releases/*
  # Check if there's a successful service build for the same branch, and
  # extract its run id to be used in both TEST and PRODUCTION deployments.
  # --------------------------------------------------------------------------------------------- #
  resolve_build_test:
    name: Resolve Build Artifacts (Test)
    runs-on: ubicloud-standard-2
    outputs:
      tags: ${{ steps.read.outputs.tags }}
      fe-samples: ${{ steps.read.outputs.fe-samples }}
    steps:
      - name: Determine if the current branch is allowed
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if [[ ! "$BRANCH" =~ ^releases/ ]]; then
            echo "::error::Branch '$BRANCH' is not allowed. Only branches starting with 'releases/' can trigger this workflow."
            # exit 1
          fi
          echo "::notice::Branch '$BRANCH' is allowed"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Read deployment versions
        id: read
        run: |
          VERSION_FILE=".github/deployment-versions/services/test.yaml"

          # Output as JSON for matrix lookups
          echo "tags=$(yq -o=json '.' "$VERSION_FILE" | jq -c '.')" >> "$GITHUB_OUTPUT"

          # Output individual values
          for key in fe-samples; do
            value=$(yq ".[\"$key\"]" "$VERSION_FILE")
            echo "$key=$value" >> "$GITHUB_OUTPUT"
            echo "::notice::$key: $value"
          done

  # --------------------------------------- Approval: TEST -------------------------------------- #
  approve_test_deploy:
    name: Approve Test Deployment
    needs: resolve_build_test
    runs-on: ubicloud-standard-2
    permissions:
      issues: write
    steps:
      - name: Request approval for Test deployment
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: yohanAnushka,EmperorRXF,BenjaminSchwendner
          minimum-approvals: 1
          issue-title: Manual Approval for Test Services Deployment
          issue-body: |
            Type `approve` to approve or `denied` to reject the workflow ${{ github.run_name }}

            > [!TIP]
            > ### Deployment Versions
            > `Version File`: `.github/deployment-versions/services/test.yaml`

            >[!NOTE]
            > ### Execution Details
            > Ref: `${{ github.ref_name }}`
            > By: @${{ github.actor }}

  # --------------------------------------- Deployment: TEST ------------------------------------ #
  # All services are deployed in parallel using a matrix strategy.
  # --------------------------------------------------------------------------------------------- #
  test_deploy:
    name: Deploy Services (Test)
    needs: [ resolve_build_test, approve_test_deploy ]
    uses: ./.github/workflows/templates-deploy-service.yml
    secrets:
      kube-config: ${{ secrets.KUBECONFIG_NON_PRODUCTION }}
      docker-registry-username: ${{ secrets.HARBOR_PUSH_USERNAME }}
      docker-registry-password: ${{ secrets.HARBOR_PUSH_PASSWORD }}
    with:
      deploy: ${{ matrix.deploy }}
      runs-on: ubicloud-standard-2
      environment: Test
      service-name: ${{ matrix.service }}
      image-name: ${{ matrix.image-name || matrix.service }}-service
      kubernetes-namespace: managed-test
      environment-overlay: test
      image-tag: ${{ fromJSON(needs.resolve_build_test.outputs.tags)[matrix.service] }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: fe-samples
            deploy: ${{ inputs.deploy-fe-samples }}

  # -------------------------------------- Post-check: TEST ------------------------------------- #
  # Check if all services were successfully deployed to TEST.
  # Without this condition succeeding, we will not move on to PRODUCTION
  # --------------------------------------------------------------------------------------------- #
  test_stage_complete:
    name: Finish Test Stage
    runs-on: ubicloud-standard-2
    needs:
      - test_deploy
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more test deployments failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more test deployments were cancelled"
            exit 1
          fi
          echo "::notice::All test deployments completed successfully"

  # ----------------------------------------- Pre-check ----------------------------------------- #
  # Check if there's a successful service build for the same branch, and
  # extract its run id to be used in PRODUCTION deployments.
  # --------------------------------------------------------------------------------------------- #
  resolve_build_prod:
    name: Resolve Build Artifacts (Prod)
    runs-on: ubicloud-standard-2
    needs: test_stage_complete
    outputs:
      tags: ${{ steps.read.outputs.tags }}
      fe-samples: ${{ steps.read.outputs.fe-samples }}
    steps:
      - name: Determine if the current branch is allowed
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if [[ ! "$BRANCH" =~ ^releases/ ]]; then
            echo "::error::Branch '$BRANCH' is not allowed. Only branches starting with 'releases/' can trigger this workflow."
            # exit 1
          fi
          echo "::notice::Branch '$BRANCH' is allowed"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Read deployment versions
        id: read
        run: |
          VERSION_FILE=".github/deployment-versions/services/prod.yaml"

          # Output as JSON for matrix lookups
          echo "tags=$(yq -o=json '.' "$VERSION_FILE" | jq -c '.')" >> "$GITHUB_OUTPUT"

          # Output individual values
          for key in fe-samples; do
            value=$(yq ".[\"$key\"]" "$VERSION_FILE")
            echo "$key=$value" >> "$GITHUB_OUTPUT"
            echo "::notice::$key: $value"
          done

  # ------------------------------------ Approval: PRODUCTION ----------------------------------- #
  approve_prod_deploy:
    name: Approve Production Deployment
    needs: [ resolve_build_prod, test_stage_complete ]
    runs-on: ubicloud-standard-2
    permissions:
      issues: write
    steps:
      - name: Request approval for Production deployment
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: yohanAnushka,EmperorRXF,BenjaminSchwendner
          minimum-approvals: 1
          issue-title: Manual Approval for Production Services Deployment
          issue-body: |
            Type `approve` to approve or `denied` to reject the workflow ${{ github.run_name }}

            > [!TIP]
            > ### Deployment Versions
            > `Version File`: `.github/deployment-versions/services/prod.yaml`

            >[!NOTE]
            > ### Execution Details
            > Ref: `${{ github.ref_name }}`
            > By: @${{ github.actor }}

  # ----------------------------------- Deployment: PRODUCTION ---------------------------------- #
  # All services are deployed in parallel using a matrix strategy.
  # --------------------------------------------------------------------------------------------- #
  prod_deploy:
    name: Deploy Services (Prod)
    needs: [ resolve_build_prod, approve_prod_deploy ]
    uses: ./.github/workflows/templates-deploy-service.yml
    secrets:
      kube-config: ${{ secrets.KUBECONFIG_PRODUCTION }}
      docker-registry-username: ${{ secrets.HARBOR_PUSH_USERNAME }}
      docker-registry-password: ${{ secrets.HARBOR_PUSH_PASSWORD }}
    with:
      deploy: ${{ matrix.deploy }}
      runs-on: ubicloud-standard-2
      environment: Production
      service-name: ${{ matrix.service }}
      image-name: ${{ matrix.image-name || matrix.service }}-service
      kubernetes-namespace: managed-prod
      environment-overlay: prod
      image-tag: ${{ fromJSON(needs.resolve_build_prod.outputs.tags)[matrix.service] }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: fe-samples
            deploy: ${{ inputs.deploy-fe-samples }}
