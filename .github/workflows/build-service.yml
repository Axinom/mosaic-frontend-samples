name: Build FE

on:
  schedule:
    - cron: '35 3 * * 1-5'
  workflow_dispatch:
    inputs:
      library-target:
        type: choice
        description: Library Target
        options:
          - prerelease
          - next

env:
  DOCKER_REGISTRY_URL: harbor.axinom.com
  DOCKER_REPOSITORY: harbor.axinom.com/mosaic/managed-services/fe-samples-service
  NODE_OPTIONS: --max-old-space-size=8192
  CI: false # to avoid lint-warning becoming a build failure.
jobs:
  prepare:
    name: Prepare Build
    runs-on: ubicloud-standard-2
    outputs:
      composite_id: ${{ steps.tags.outputs.composite_id }}
    steps:
      - name: Generate composite tag
        id: tags
        run: |
          DATE_TAG=$(date -u +%Y.%m.%d-%H.%M.%S)
          COMPOSITE_ID="${DATE_TAG}_${{ github.run_id }}_${{ inputs.library-target || 'prerelease' }}"
          echo "composite_id=${COMPOSITE_ID}" >> "$GITHUB_OUTPUT"
          echo "::notice::Composite tag: ${COMPOSITE_ID}"

  build_and_push:
    name: Build and Push to Docker
    needs: [prepare]
    runs-on: ubicloud-standard-2
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build service
        run: yarn build

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.HARBOR_PUSH_USERNAME }}
          password: ${{ secrets.HARBOR_PUSH_PASSWORD }}
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push to docker repository
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          file: Dockerfile
          tags: |
            ${{ env.DOCKER_REPOSITORY }}:${{ github.run_id }}
            ${{ env.DOCKER_REPOSITORY }}:${{ github.sha }}
            ${{ env.DOCKER_REPOSITORY }}:${{ needs.prepare.outputs.composite_id }}

      - name: Upload build result
        run: |
          echo "fe-samples: ${{ needs.prepare.outputs.composite_id }}" > result.txt

      - uses: actions/upload-artifact@v6
        with:
          name: build-result-fe-samples
          path: result.txt
          retention-days: 1

  collect_results:
    name: Collect Results
    needs: [prepare, build_and_push]
    if: always()
    uses: ./.github/workflows/templates-update-build-versions.yml
    secrets:
      gh_app_id: ${{ secrets.GH_APP_MOSAIC_AUTOMATION_APP_ID }}
      gh_app_private_key: ${{ secrets.GH_APP_MOSAIC_AUTOMATION_PRIVATE_KEY }}
    with:
      build-type: service
#
#  slack_notification:
#    name: Slack Notification
#    needs: [collect_results]
#    if: always()
#    uses: ./.github/workflows/templates-slack-build-notification.yml
#    secrets:
#      slack_bot_token: ${{ secrets.SLACK_API_TOKEN_NAVY_CHANNELS }}
#      slack_channel_id: ${{ vars.SLACK_CHANNEL_ID_NAVY_CB_AUTO_RELEASE }}
#    with:
#      build-type: service

  trigger_deploy:
    name: Trigger Service Deployment
    needs: [collect_results]
    if: always()
    runs-on: ubicloud-standard-2
    steps:
      - name: Trigger service deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WORKFLOW="deploy-services-prerelease.yml"

          if [[ "${{ github.ref }}" == refs/heads/releases/* ]]; then
            WORKFLOW="deploy-services-release.yml"
          fi

          gh workflow run "$WORKFLOW" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref }}"
          echo "::notice::Triggered $WORKFLOW on ${{ github.ref }}"
