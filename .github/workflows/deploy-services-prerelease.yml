name: Deploy FE Prerelease (CB)
# Stages:
# - Resolve Build Artifacts
# - Deployment

on:
  workflow_dispatch:
    inputs:
      deploy-fe-samples:
        type: boolean
        default: true
        description: Deploy fe-samples

jobs:
  # ----------------------------------------- Pre-check ----------------------------------------- #
  # Check if there's a successful backend build for the same branch, and
  # extract its run id to be used in deployments.
  # --------------------------------------------------------------------------------------------- #
  resolve_build:
    name: Resolve Build Artifacts
    runs-on: ubicloud-standard-2
    outputs:
      tags: ${{ steps.read.outputs.tags }}
      fe-samples: ${{ steps.read.outputs.fe-samples }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Read deployment versions
        id: read
        run: |
          VERSION_FILE=".github/deployment-versions/services/cb.yaml"

          # Output as JSON for matrix lookups
          echo "tags=$(yq -o=json '.' "$VERSION_FILE" | jq -c '.')" >> "$GITHUB_OUTPUT"

          # Output individual values
          for key in fe-samples; do
            value=$(yq ".[\"$key\"]" "$VERSION_FILE")
            echo "$key=$value" >> "$GITHUB_OUTPUT"
            echo "::notice::$key: $value"
          done

  # --------------------------------------- Deployment ------------------------------------------ #
  # All secondary services depend on ID and are deployed in parallel using a matrix strategy.
  # --------------------------------------------------------------------------------------------- #
  deploy:
    name: Deploy Secondary Services
    needs: [ resolve_build ]
    uses: ./.github/workflows/templates-deploy-service.yml
    secrets:
      kube-config: ${{ secrets.KUBECONFIG_NON_PRODUCTION }}
      docker-registry-username: ${{ secrets.HARBOR_PUSH_USERNAME }}
      docker-registry-password: ${{ secrets.HARBOR_PUSH_PASSWORD }}
    with:
      deploy: true
      runs-on: ubicloud-standard-2
      environment: Prerelease
      service-name: ${{ matrix.service }}
      image-name: ${{ matrix.image-name || matrix.service }}
      kubernetes-namespace: managed-cb
      environment-overlay: cb
      image-tag: ${{ fromJSON(needs.resolve_build.outputs.tags)[matrix.service] }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: fe-samples
            deploy: ${{ inputs.deploy-fe-samples }}
