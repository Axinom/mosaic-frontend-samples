name: Deploy Single Managed Service Template

on:
  workflow_call:
    secrets:
      kube-config:
        required: true
        description: Kubernetes config for cluster access
      docker-registry-username:
        required: true
        description: Docker registry username for re-tagging
      docker-registry-password:
        required: true
        description: Docker registry password for re-tagging
    inputs:
      deploy:
        required: true
        type: boolean
        description: Indicates if this should be deployed
      runs-on:
        required: true
        type: string
      environment:
        required: true
        type: string
        description: GitHub environment name for deployment
      service-name:
        required: true
        type: string
        description: Name of the service being deployed (e.g., id, axauth, hosting)
      image-name:
        required: false
        type: string
        description: Name of the image inside the Docker repository if the image name and service name are different
      kubernetes-namespace:
        required: true
        type: string
        description: Kubernetes namespace to deploy to
      environment-overlay:
        required: true
        type: string
        description: Environment overlay name (e.g., cb, test, prod)
      image-tag:
        required: true
        type: string
        description: Docker image tag to deploy (typically the build run ID)

jobs:
  deploy:
    if: ${{ inputs.deploy }}
    name: Deploy ${{ inputs.service-name }}
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Update image tag in manifest
        working-directory: .kubernetes/${{ inputs.service-name }}/overlays/${{ inputs.environment-overlay }}
        run: |
          echo "::notice::Updating image tag to: ${{ inputs.image-tag }}"
          sed -i 's/:latest/:${{ inputs.image-tag }}/g' image.yaml
          echo "Updated image.yaml:"
          cat image.yaml

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'v1.26.3'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.kube-config }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to kubernetes
        working-directory: .kubernetes/${{ inputs.service-name }}/overlays/${{ inputs.environment-overlay }}
        run: |
          echo "::notice::Deploying ${{ inputs.service-name }} to ${{ inputs.kubernetes-namespace }}"
          kubectl apply -k . -n ${{ inputs.kubernetes-namespace }}

      - name: Wait for rollout completion
        run: |
          echo "::notice::Waiting for rollout of ${{ inputs.service-name }}..."
          kubectl rollout status deployment/${{ inputs.service-name }} -n ${{ inputs.kubernetes-namespace }} --timeout=300s
          echo "::notice::Deployment of ${{ inputs.service-name }} completed successfully"

      - name: Re-tag image with environment-latest
        run: |
          HARBOR_URL="https://harbor.axinom.com"
          PROJECT="mosaic"
          REPOSITORY="managed-services/${{ inputs.image-name }}"
          # Double url-encode repository name to be compatiable with habor API
          REPOSITORY_URL_ENCODED=$(printf %s $(printf %s "$REPOSITORY" |jq -sRr @uri) | jq -sRr @uri)
          SOURCE_TAG="${{ inputs.image-tag }}"
          NEW_TAG="${{ inputs.environment-overlay }}-latest"

          echo "::notice::Adding tag '$NEW_TAG' to artifact with tag '$SOURCE_TAG' via Harbor API"

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            "${HARBOR_URL}/api/v2.0/projects/${PROJECT}/repositories/${REPOSITORY_URL_ENCODED}/artifacts/${SOURCE_TAG}/tags" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.docker-registry-username }}:${{ secrets.docker-registry-password }}" \
            -d "{\"name\": \"${NEW_TAG}\"}")

          if [[ "$HTTP_STATUS" == "201" ]]; then
            echo "::notice::Successfully tagged image as ${NEW_TAG}"
          elif [[ "$HTTP_STATUS" == "409" ]]; then
            echo "::notice::Tag ${NEW_TAG} already exists, deleting and re-creating..."
            # Delete existing tag
            curl -s -X DELETE \
              "${HARBOR_URL}/api/v2.0/projects/${PROJECT}/repositories/${REPOSITORY_URL_ENCODED}/artifacts/${NEW_TAG}/tags/${NEW_TAG}" \
              -u "${{ secrets.docker-registry-username }}:${{ secrets.docker-registry-password }}"
            # Re-create tag
            HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST \
              "${HARBOR_URL}/api/v2.0/projects/${PROJECT}/repositories/${REPOSITORY_URL_ENCODED}/artifacts/${SOURCE_TAG}/tags" \
              -H "Content-Type: application/json" \
              -u "${{ secrets.docker-registry-username }}:${{ secrets.docker-registry-password }}" \
              -d "{\"name\": \"${NEW_TAG}\"}")
            if [[ "$HTTP_STATUS" == "201" ]]; then
              echo "::notice::Successfully re-tagged image as ${NEW_TAG}"
            else
              echo "::error::Failed to re-tag image. HTTP status: ${HTTP_STATUS}"
              cat /tmp/response.json
              exit 1
            fi
          else
            echo "::error::Failed to tag image. HTTP status: ${HTTP_STATUS}"
            cat /tmp/response.json
            exit 1
          fi

      - name: Cleanup kubectl config
        if: always()
        run: rm -f ~/.kube/config
